name: Fast-forward check

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

env:
  # Run every JavaScript action on Node 24 (the default from 2026-06-16) — the sequoia-pgp
  # action is Docker-based and unaffected, but any future JS action added here will comply
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Check if fast-forwarding is possible
        uses: sequoia-pgp/fast-forward@v1
        with:
          merge: false
          # Only comment on the PR when fast-forwarding is NOT possible
          comment: on-error
