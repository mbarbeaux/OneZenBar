name: Fast-forward

on:
  issue_comment:
    types:
      - created

env:
  # Run every JavaScript action on Node 24 (the default from 2026-06-16) — the sequoia-pgp
  # action is Docker-based and unaffected, but any future JS action added here will comply
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fast-forward:
    # Run only for comments STARTING with `/fast-forward`, posted by the repo owner on an OPEN pull request.
    # startsWith (not contains!) and the open check both matter: the action posts its result comment through
    # FAST_FORWARD_PAT (author = owner) and quotes the head commit message — if that message happens to
    # contain the string "/fast-forward" (e.g. mentioning sequoia-pgp/fast-forward), a contains() match
    # re-triggers this workflow on the merged PR forever (merge fails -> comment -> trigger -> ...).
    if: |
      github.event.issue.pull_request
      && github.event.issue.state == 'open'
      && startsWith(github.event.comment.body, '/fast-forward')
      && github.event.comment.author_association == 'OWNER'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Fast-forward the target branch
        uses: sequoia-pgp/fast-forward@v1
        with:
          merge: true
          comment: always
          # A PAT is required (not the default GITHUB_TOKEN): pushes made with
          # GITHUB_TOKEN do not trigger workflows, so main.yml (changelog, tag,
          # develop fast-forward) and develop.yml would never run after the merge.
          # Required fine-grained PAT permissions: Contents read/write (push)
          # AND Pull requests read/write (read PR metadata, post the result
          # comment) — without the latter the PR fetch returns nothing and the
          # action fails with "credential url cannot be parsed".
          github_token: ${{ secrets.FAST_FORWARD_PAT }}
