name: Develop

on:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Run every JavaScript action on Node 24 (the default from 2026-06-16).
  # Note: does NOT propagate to the reusable quality-gate.yml, which sets it itself.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    uses: ./.github/workflows/quality-gate.yml
    # The reusable workflow's job requests pull-requests: write (PR coverage comment) —
    # static validation requires every caller to grant it, even on push-only triggers
    permissions:
      contents: read
      pull-requests: write
    # Like env, secrets do NOT propagate to reusable workflows — required for the MSIX signing
    # secrets (SIGNING_CERTIFICATE_*) read inside the quality gate
    secrets: inherit

  # Publishes the interactive coverage report (with history/trend charts) to GitHub Pages.
  # Gated behind the COVERAGE_PAGES_ENABLED repository variable: set it to 'true' once the
  # repo is public AND Pages is enabled (Settings > Pages > Source: GitHub Actions).
  coverage-pages:
    if: ${{ vars.COVERAGE_PAGES_ENABLED == 'true' }}
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      HUSKY: 0
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Download coverage data
        uses: actions/download-artifact@v8
        with:
          name: coverage-data
          path: coverage-data

      - name: Restore coverage history
        # Each run restores the most recent history (restore-keys prefix match)
        # and saves an updated snapshot under a fresh key (run id)
        uses: actions/cache@v5
        with:
          path: coverage-history
          key: coverage-history-${{ github.run_id }}
          restore-keys: coverage-history-

      - name: Generate coverage site
        # Html: interactive report with per-file line coverage and trend charts (from -historydir).
        # Badges: SVG badges served from the Pages site (referenced by the README).
        run: dotnet reportgenerator -reports:"coverage-data/**/coverage.cobertura.xml" -targetdir:coverage-site "-reporttypes:Html;Badges" -historydir:coverage-history

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: coverage-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
