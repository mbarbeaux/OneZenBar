name: Develop

on:
  push:
    branches:
      - develop
  # Manual trigger: re-run the widget build on demand, without an empty commit or a PR
  # (Actions tab > Develop > Run workflow, or `gh workflow run develop.yml --ref develop`).
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Run every JavaScript action on Node 24 (the default from 2026-06-16).
  # Note: does NOT propagate to the reusable quality-gate.yml, which sets it itself.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    uses: ./.github/workflows/quality-gate.yml
    permissions:
      contents: read
    # Like env, secrets do NOT propagate to reusable workflows — required for the MSIX signing
    # secrets (SIGNING_CERTIFICATE_*) and the GH_PACKAGES_PAT restore credential used inside the gate
    secrets: inherit
