name: Main

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  HUSKY: 0
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Run every JavaScript action on Node 24 (the default from 2026-06-16)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      oid: ${{ steps.release.outputs.oid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # ShipIt reads the full Conventional Commits history to compute the version
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Generate changelog
        # GitFlow merge commits are skipped (--skip-merge-commit); release-worthy
        # Conventional Commits merged from release/* or hotfix/* drive the version bump.
        run: dotnet shipit --mode local --allow-branch main --skip-merge-commit

      - name: Commit changelog
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md is up to date — nothing to release."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version=$(grep -m1 -oE '^## [0-9]+\.[0-9]+\.[0-9]+[^ ]*' CHANGELOG.md | cut -d' ' -f2)

          # Commit through the GitHub API (createCommitOnBranch) instead of `git push`:
          # the commit is signed by GitHub and shows as Verified.
          oid=$(gh api graphql \
            -f query='mutation ($input: CreateCommitOnBranchInput!) {
              createCommitOnBranch(input: $input) { commit { oid } }
            }' \
            -F "input[branch][repositoryNameWithOwner]=$GITHUB_REPOSITORY" \
            -F "input[branch][branchName]=main" \
            -F "input[expectedHeadOid]=$(git rev-parse HEAD)" \
            -F "input[message][headline]=chore: release ${version}" \
            -F "input[fileChanges][additions][][path]=CHANGELOG.md" \
            -F "input[fileChanges][additions][][contents]=$(base64 -w0 CHANGELOG.md)" \
            --jq '.data.createCommitOnBranch.commit.oid')

          echo "Committed 'chore: release ${version}' to main (${oid})."
          {
            echo "released=true"
            echo "version=${version}"
            echo "oid=${oid}"
          } >> "$GITHUB_OUTPUT"

      - name: Tag release
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          OID: ${{ steps.release.outputs.oid }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/v${VERSION}" \
            -f sha="$OID"
          echo "Tagged v${VERSION} at ${OID}."

      - name: Fast-forward develop
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          OID: ${{ steps.release.outputs.oid }}
        run: |
          # Bring develop up to date with main without a merge commit. A non-forced
          # ref update only succeeds as a fast-forward, so signed history is never
          # rewritten. If develop has diverged, rebase it locally instead (commits
          # rebased in CI would be unsigned).
          if gh api -X PATCH "repos/$GITHUB_REPOSITORY/git/refs/heads/develop" \
               -f sha="$OID" -F force=false; then
            echo "develop fast-forwarded to v${VERSION}."
          else
            echo "::warning::develop has diverged from main and cannot be fast-forwarded. Rebase it locally: git fetch && git checkout develop && git rebase origin/main && git push --force-with-lease"
          fi

  # Builds the Store package (.msixupload, unsigned — the Store re-signs) at the release commit
  # and submits it for certification via the Microsoft Store CLI. Runs after the tag exists.
  # Gated behind the STORE_UPLOAD_ENABLED repository variable: set it to 'true' only AFTER the
  # first submission (listing, screenshots, IARC age rating) has been completed once in Partner
  # Center — the API can update an app's packages but cannot create that initial listing.
  store-upload:
    needs: changelog
    if: ${{ needs.changelog.outputs.released == 'true' && vars.STORE_UPLOAD_ENABLED == 'true' }}
    runs-on: windows-2025-vs2026

    permissions:
      contents: read

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          # The release commit (created via API in the changelog job) carries the tag MinVer needs
          ref: ${{ needs.changelog.outputs.oid }}
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: msbuild src/Sample.Widget/Sample.Widget.csproj /t:Restore /p:Configuration=Release /verbosity:minimal

      - name: Build Store package (.msixupload)
        shell: pwsh
        env:
          STORE_IDENTITY_NAME: ${{ secrets.STORE_IDENTITY_NAME }}
          STORE_IDENTITY_PUBLISHER: ${{ secrets.STORE_IDENTITY_PUBLISHER }}
          STORE_PUBLISHER_DISPLAY_NAME: ${{ secrets.STORE_PUBLISHER_DISPLAY_NAME }}
          STORE_APP_DISPLAY_NAME: ${{ secrets.STORE_APP_DISPLAY_NAME }}
        # StoreUpload mode produces an unsigned .msixbundle wrapped in a .msixupload: the Store
        # re-signs with Microsoft's certificate, so AppxPackageSigningEnabled stays false. The
        # Store identity is still injected so the package matches the reserved product.
        # GenerateTemporaryStoreCertificate=false: the csproj enables it for local VS deploys, but
        # with signing disabled MSBuild still runs RemoveDisposableSigningCertificate and fails
        # (MSB4044, empty CertificateThumbprint) — disabling it skips the disposable-cert flow.
        run: >
          msbuild src/Sample.Widget/Sample.Widget.csproj
          /p:Configuration=Release
          /p:Platform=x64
          /p:AppxBundlePlatforms="x86|x64|ARM64"
          /p:AppxBundle=Always
          /p:UapAppxPackageBuildMode=StoreUpload
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages\"
          /p:StampPackageVersion=true
          /p:AppxPackageSigningEnabled=false
          /p:GenerateTemporaryStoreCertificate=false
          "/p:AppxIdentityName=$env:STORE_IDENTITY_NAME"
          "/p:AppxIdentityPublisher=$env:STORE_IDENTITY_PUBLISHER"
          "/p:AppxPublisherDisplayName=$env:STORE_PUBLISHER_DISPLAY_NAME"
          "/p:AppxDisplayName=$env:STORE_APP_DISPLAY_NAME"
          /verbosity:minimal

      - name: Setup Microsoft Store CLI
        # Puts `msstore` on PATH. node20 action — runs on Node 24 via FORCE_JAVASCRIPT_ACTIONS_TO_NODE24.
        uses: microsoft/microsoft-store-apppublisher@v1.3

      - name: Submit to the Microsoft Store
        shell: pwsh
        env:
          AAD_TENANT_ID: ${{ secrets.AAD_TENANT_ID }}
          AAD_CLIENT_ID: ${{ secrets.AAD_CLIENT_ID }}
          AAD_CLIENT_SECRET: ${{ secrets.AAD_CLIENT_SECRET }}
          PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          STORE_APP_ID: ${{ secrets.STORE_APP_ID }}
        run: |
          msstore reconfigure --tenantId $env:AAD_TENANT_ID --sellerId $env:PARTNER_CENTER_SELLER_ID --clientId $env:AAD_CLIENT_ID --clientSecret $env:AAD_CLIENT_SECRET
          if ($LASTEXITCODE -ne 0) { throw "msstore reconfigure failed" }
          $pkg = Get-ChildItem -Path AppPackages -Recurse -Filter *.msixupload | Select-Object -First 1
          if (-not $pkg) { throw "No .msixupload produced" }
          Write-Host "Submitting $($pkg.Name) to app $env:STORE_APP_ID"
          # publish: uploads the package into a new submission and commits it for certification
          msstore publish $pkg.FullName --appId $env:STORE_APP_ID
          if ($LASTEXITCODE -ne 0) { throw "msstore publish failed" }
