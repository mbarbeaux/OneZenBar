name: Quality gate

# Reusable quality gate shared by build.yml and develop.yml.
# Not triggered directly — callers invoke it with `uses: ./.github/workflows/quality-gate.yml`.
on:
  workflow_call:

env:
  # Skip Husky.Net git hook installation in CI (hooks are for local commits only)
  HUSKY: 0
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Run every JavaScript action on Node 24 (the default from 2026-06-16): actions that only
  # support the deprecated Node 20 fail loudly here instead of silently running on it
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Builds the UWP Xbox Game Bar widget — only possible on Windows (VS UWP workload).
  # This is the repo's only build: the shared business logic now lives in the separate, private
  # OneZenBar.Core package (consumed via NuGet), so there is no cross-platform class library or
  # test suite to build here anymore.
  # Produces one sideload .msixbundle containing the x86, x64 and ARM64 flavors, with the
  # appx version stamped from MinVer (StampPackageVersion). The bundle is SIGNED with the
  # self-signed dev certificate when the SIGNING_CERTIFICATE_* secrets are present (their
  # absence — e.g. before setup, or on Dependabot PRs which cannot read secrets — gracefully
  # falls back to an unsigned bundle). The certificate Subject must match the manifest
  # Publisher injected at build time from STORE_IDENTITY_PUBLISHER (not the neutral dev
  # placeholder committed in Package.appxmanifest), and target machines must trust the
  # public .cer (LocalMachine\TrustedPeople) for the bundle to install.
  widget:
    # Runner selection (manual toggle): when the SELF_HOSTED repo variable is 'true', run on the
    # local self-hosted Windows runner (labels self-hosted + Windows + X64); otherwise on the
    # GitHub-hosted windows-2025-vs2026 image. Set it with `gh variable set SELF_HOSTED --body true`
    # (or false). GitHub has NO automatic availability fallback: if SELF_HOSTED is 'true' but the
    # runner is offline, the job queues and waits — flip the variable back to 'false' when the
    # machine is down. The self-hosted runner must match the hosted toolchain: Visual Studio 2026
    # (MSBuild 18 — VS 2022's MSBuild 17 cannot load the .NET 10 SDK in global.json), the UWP
    # workload, Windows 10 SDK 26100 and the .NET 10 SDK.
    #
    # Fork-PR guard (the repo is public): NEVER run on the self-hosted machine for a pull_request
    # coming from a fork — otherwise anyone could execute arbitrary code on it. The self-hosted
    # runner is used only on push events and on same-repo PRs (head.repo == this repo); fork PRs
    # always fall back to the GitHub-hosted image (they also lack the signing secrets, so the build
    # gracefully produces an unsigned bundle). This complements the repo setting "Require approval
    # for all outside collaborators" (Settings > Actions > General > Fork pull request workflows).
    runs-on: ${{ (vars.SELF_HOSTED == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted", "Windows", "X64"]') || 'windows-2025-vs2026' }}

    permissions:
      contents: read

    env:
      # Secrets are unreadable in step `if:` expressions — exposed here as job-level flags.
      # The Store identity (kept out of source control) is injected into the manifest when its
      # secrets exist; signing additionally requires the certificate, whose subject must equal
      # the injected Publisher — hence CAN_SIGN requiring BOTH groups of secrets.
      HAS_STORE_IDENTITY: ${{ secrets.STORE_IDENTITY_NAME != '' }}
      CAN_SIGN: ${{ secrets.SIGNING_CERTIFICATE_BASE64 != '' && secrets.STORE_IDENTITY_NAME != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # MinVer computes the version from the latest reachable v* tag — needs full history and tags
          fetch-depth: 0

      - name: Setup .NET SDK
        # The widget consumes the OneZenBar.Core package and queries OneZenBar.Version (SDK-style)
        # for the appx version: MSBuild resolves the .NET SDK pinned in global.json via dotnet on PATH.
        # Skipped on the self-hosted runner: it already has the SDK (VS 2026), and setup-dotnet
        # cannot install into C:\Program Files\dotnet without admin. The machine must provide a
        # .NET 10 SDK >= 10.0.300 on PATH (global.json: 10.0.300, rollForward latestFeature).
        if: ${{ vars.SELF_HOSTED != 'true' }}
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        # OneZenBar.Core is a PRIVATE package on GitHub Packages — nuget.config reads the credential
        # from GH_PACKAGES_PAT (read:packages). The default GITHUB_TOKEN cannot read another
        # repo's packages. Fork PRs have no access to this secret, so they cannot restore Core and
        # this step fails for them — expected for an open-core repo with a closed dependency.
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        # Restore the version anchor too: StampAppxManifestVersion invokes MinVer on it at build
        # time, and MinVer's targets only exist after a restore (MSB4057 otherwise).
        run: |
          msbuild src/OneZenBar.Version/OneZenBar.Version.csproj /t:Restore /verbosity:minimal
          msbuild src/OneZenBar.Widget/OneZenBar.Widget.csproj /t:Restore /p:Configuration=Release /verbosity:minimal

      - name: Decode signing certificate
        if: env.CAN_SIGN == 'true'
        shell: pwsh
        env:
          SIGNING_CERT_B64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
        run: '[IO.File]::WriteAllBytes("$env:RUNNER_TEMP\signing.pfx", [Convert]::FromBase64String($env:SIGNING_CERT_B64))'

      - name: Build MSIX bundle (x86 + x64 + ARM64)
        shell: pwsh
        env:
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          STORE_IDENTITY_NAME: ${{ secrets.STORE_IDENTITY_NAME }}
          STORE_IDENTITY_PUBLISHER: ${{ secrets.STORE_IDENTITY_PUBLISHER }}
          STORE_PUBLISHER_DISPLAY_NAME: ${{ secrets.STORE_PUBLISHER_DISPLAY_NAME }}
          STORE_APP_DISPLAY_NAME: ${{ secrets.STORE_APP_DISPLAY_NAME }}
        # The Store identity and signing properties are only injected when their secrets exist;
        # the timestamp server keeps the signature valid after the certificate itself expires
        run: >
          msbuild src/OneZenBar.Widget/OneZenBar.Widget.csproj
          /p:Configuration=Release
          /p:Platform=x64
          /p:AppxBundlePlatforms="x86|x64|ARM64"
          /p:AppxBundle=Always
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages\"
          /p:StampPackageVersion=true
          ${{ env.HAS_STORE_IDENTITY == 'true' && '"/p:AppxIdentityName=$env:STORE_IDENTITY_NAME" "/p:AppxIdentityPublisher=$env:STORE_IDENTITY_PUBLISHER" "/p:AppxPublisherDisplayName=$env:STORE_PUBLISHER_DISPLAY_NAME" "/p:AppxDisplayName=$env:STORE_APP_DISPLAY_NAME"' || '' }}
          /p:AppxPackageSigningEnabled=${{ env.CAN_SIGN }}
          ${{ env.CAN_SIGN == 'true' && format('/p:PackageCertificateKeyFile={0}\signing.pfx /p:PackageCertificatePassword=$env:SIGNING_CERT_PASSWORD /p:AppxPackageSigningTimestampServerUrl=http://timestamp.digicert.com', runner.temp) || '' }}
          /verbosity:minimal

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: OneZenBar.Widget-msix
          path: AppPackages/**/*.msixbundle
