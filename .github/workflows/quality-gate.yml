name: Quality gate

# Reusable quality gate shared by build.yml, develop.yml and release.yml.
# Not triggered directly — callers invoke it with `uses: ./.github/workflows/quality-gate.yml`.
on:
  workflow_call:

env:
  # Skip Husky.Net git hook installation in CI (hooks are for local commits only)
  HUSKY: 0
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Run every JavaScript action on Node 24 (the default from 2026-06-16): actions that only
  # support the deprecated Node 20 fail loudly here instead of silently running on it
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Needed to post/update the coverage comment on PRs
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # MinVer computes the version from the latest reachable v* tag — needs full history and tags
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          # Uses the SDK version pinned in global.json (single source of truth with mise.toml)
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Restore dotnet tools
        # ReportGenerator comes from the local tools manifest; the automatic restore at build
        # time (InstallGitHooks target in Directory.Build.props) is disabled in CI by HUSKY=0
        run: dotnet tool restore

      - name: Check formatting
        # Same check as the local pre-commit hook (style, .editorconfig, license headers)
        run: dotnet format --verify-no-changes --severity error --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        # GitHubActionsTestLogger: failed tests become annotations + a report in the job summary.
        # coverlet.msbuild: fails this step if line coverage drops below the Threshold set in the test csproj.
        run: dotnet test --no-build --configuration Release --logger GitHubActions /p:CollectCoverage=true

      - name: Coverage report
        # Runs even when the Test step failed (tests red or coverage below threshold):
        # the cobertura file is written before the threshold check, and the report is most useful exactly then.
        if: ${{ !cancelled() }}
        run: |
          dotnet reportgenerator -reports:"tests/**/coverage.cobertura.xml" -targetdir:coverage-report "-reporttypes:MarkdownSummaryGithub;Html"
          cat coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report artifact
        # Full interactive HTML report (per-file source view with line-by-line coverage highlighting)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report

      - name: Upload coverage data
        # Raw cobertura files for downstream jobs (e.g. the GitHub Pages publication in develop.yml)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data
          path: tests/**/coverage.cobertura.xml

      - name: Post coverage comment on PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage
          path: coverage-report/SummaryGithub.md

  # Builds the UWP Xbox Game Bar widget — only possible on Windows (VS UWP workload).
  # Produces one unsigned sideload .msixbundle containing the x86, x64 and ARM64 flavors,
  # with the appx version stamped from MinVer (StampPackageVersion).
  widget:
    # windows-2025-vs2026: Visual Studio 2026 (MSBuild 18) is required — VS 2022's MSBuild 17
    # cannot load the .NET 10 SDK pinned in global.json (needed to build SampleClasslib)
    runs-on: windows-2025-vs2026

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # MinVer computes the version from the latest reachable v* tag — needs full history and tags
          fetch-depth: 0

      - name: Setup .NET SDK
        # The widget references SampleClasslib (SDK-style project): MSBuild resolves the .NET SDK
        # pinned in global.json through the dotnet on PATH
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: msbuild src/Sample.Widget/Sample.Widget.csproj /t:Restore /p:Configuration=Release /verbosity:minimal

      - name: Build MSIX bundle (x86 + x64 + ARM64)
        run: >
          msbuild src/Sample.Widget/Sample.Widget.csproj
          /p:Configuration=Release
          /p:Platform=x64
          /p:AppxBundlePlatforms="x86|x64|ARM64"
          /p:AppxBundle=Always
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages\"
          /p:StampPackageVersion=true
          /verbosity:minimal

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: Sample.Widget-msix
          path: AppPackages/**/*.msixbundle
