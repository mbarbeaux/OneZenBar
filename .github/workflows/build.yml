name: Build

# pull_request only (no push trigger on feature branches): a push to a branch with an open PR
# would otherwise run the gate twice — and the PR run is the valuable one, since it validates
# the MERGE result against the target branch. Open a PR (draft is fine) to get CI on a branch.
on:
  pull_request:
    branches:
      - develop
      - main

# Cancel superseded runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/quality-gate.yml
    # The reusable workflow posts the coverage comment on PRs — the caller must grant the permission
    permissions:
      contents: read
      pull-requests: write
