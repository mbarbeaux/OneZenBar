name: Build

on:
  push:
    branches:
      - feature/**
  pull_request:
    branches:
      - develop
      - main

# Cancel superseded runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/quality-gate.yml
    # The reusable workflow posts the coverage comment on PRs — the caller must grant the permission
    permissions:
      contents: read
      pull-requests: write
